<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>블랙잭 게임</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container game-container">
    <header class="game-header">
      <div class="player-info">
        <span>플레이어: <strong id="playerNameDisplay"></strong></span>
        <span>칩: <strong id="chipsDisplay">0</strong></span>
        <span>잔액: <strong id="balanceDisplay">$0.00</strong></span>
      </div>
      <div class="header-actions">
        <button onclick="goHome()" class="btn-home">🏠 홈</button>
        <button onclick="showStats()" class="btn-stats">📊 통계</button>
      </div>
    </header>

    <main class="game-main">
      <!-- 딜러 영역 -->
      <div class="dealer-area">
        <h3>딜러</h3>
        <div class="cards-container" id="dealerCards"></div>
        <div class="score">딜러 점수: <span id="dealerScore">0</span></div>
      </div>

      <!-- 플레이어 영역 -->
      <div class="player-area">
        <h3>플레이어</h3>
        <div class="cards-container" id="playerCards"></div>
        <div class="score">플레이어 점수: <span id="playerScore">0</span></div>
      </div>

      <!-- 게임 상태 -->
      <div id="gameStatus" class="game-status"></div>

      <!-- 베팅 패널 -->
      <div id="bettingPanel" class="betting-panel">
        <h3>베팅</h3>
        <div class="bet-buttons">
          <button onclick="placeBet(1)" class="bet-btn">1칩</button>
          <button onclick="placeBet(5)" class="bet-btn">5칩</button>
          <button onclick="placeBet(25)" class="bet-btn">25칩</button>
          <button onclick="placeBet(100)" class="bet-btn">100칩</button>
        </div>
        <div class="current-bet">현재 베팅: <span id="currentBet">0</span>칩</div>
        <button onclick="startNewGame()" class="btn-primary btn-large">게임 시작</button>
      </div>

      <!-- 액션 버튼 -->
      <div id="actionPanel" class="action-panel" style="display: none;">
        <button onclick="hit()" class="btn-action">Hit (카드 받기)</button>
        <button onclick="stand()" class="btn-action">Stand (멈추기)</button>
        <button onclick="doubleDown()" class="btn-action">Double (더블다운)</button>
      </div>
    </main>

    <!-- 사이드바: 게임 히스토리 -->
    <aside class="sidebar">
      <div class="history-section">
        <h3>최근 게임</h3>
        <div id="gameHistory" class="history-list"></div>
      </div>
    </aside>
  </div>

  <!-- 통계 모달 -->
  <div id="statsModal" class="modal" style="display: none;">
    <div class="modal-content">
      <span class="close" onclick="closeStats()">&times;</span>
      <h2>내 통계</h2>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">총 게임</div>
          <div class="stat-value" id="statTotalGames">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">승리</div>
          <div class="stat-value" id="statWins">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">패배</div>
          <div class="stat-value" id="statLosses">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">무승부</div>
          <div class="stat-value" id="statPushes">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">승률</div>
          <div class="stat-value" id="statWinRate">0%</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">최대 승리</div>
          <div class="stat-value" id="statBiggestWin">$0</div>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
