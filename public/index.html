<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카지노 - 블랙잭 & 바카라</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- 플레이어 로그인 화면 (처음) -->
    <div id="loginScreen" class="login-container" style="display: block;">
      <div class="logo">
        <h1>◆ CASSINO ◆</h1>
        <p>블랙잭 & 바카라 게임</p>
      </div>
      <div class="login-form">
        <p class="guide-text">처음이신가요? 이름을 입력하면 자동으로 계정이 만들어집니다.</p>
        <input 
          type="text" 
          id="playerName" 
          placeholder="게임 닉네임 (2-20자, 한글/영문/숫자/_)"
          maxlength="20"
          autofocus
        >
        <button onclick="startGame()">▶ 게임 입장</button>
        <div id="error-message" class="error-message"></div>
      </div>
      <div class="admin-link">
        <a href="/admin.html">관리자 페이지</a>
      </div>
    </div>

    <!-- 게임 선택 화면 -->
    <div id="gameSelectionScreen" class="game-selection-container" style="display: none;">
      <div class="game-selection-header">
        <h1>◆ 게임 선택 ◆</h1>
        <div class="player-info-small">
          <span id="selectedPlayerName"></span> 
          <button onclick="changePlayer()" class="btn-logout">계정 변경</button>
          <a href="/admin.html" class="btn-admin">관리자</a>
        </div>
      </div>
      
      <div class="game-selection-grid">
        <!-- 블랙잭 -->
        <div class="game-card" onclick="selectGame('blackjack')">
          <div class="game-icon">♣</div>
          <h2>블랙잭</h2>
          <p>딜러와의 21점 경쟁!</p>
          <div class="game-stats">
            <span>Hit, Stand, Double</span>
          </div>
          <button class="btn-play">▶ 플레이</button>
        </div>

        <!-- 바카라 -->
        <div class="game-card" onclick="selectGame('baccarat')">
          <div class="game-icon">◆</div>
          <h2>바카라</h2>
          <p>플레이어/뱅커에 베팅하세요!</p>
          <div class="game-stats">
            <span>Player, Banker, Tie</span>
          </div>
          <button class="btn-play">▶ 플레이</button>
        </div>
      </div>

      <div class="account-info">
        <div class="info-item">
          <span>칩:</span>
          <strong id="gameSelectionChips">0</strong>
        </div>
        <div class="info-item">
          <span>잔액:</span>
          <strong id="gameSelectionBalance">$0.00</strong>
        </div>
      </div>
    </div>
  </div>

  <script>
    // 전역 변수 선언
    let currentPlayer = null;

    // localStorage에서 이전 이름 불러오기
    window.addEventListener('DOMContentLoaded', () => {
      const savedPlayerData = localStorage.getItem('playerData');
      if (savedPlayerData) {
        try {
          const playerData = JSON.parse(savedPlayerData);
          currentPlayer = playerData;
          showGameSelection(playerData);
        } catch (error) {
          console.error('저장된 데이터 로드 오류:', error);
        }
      } else {
        const savedName = localStorage.getItem('playerName');
        if (savedName) {
          document.getElementById('playerName').value = savedName;
        }
      }
    });

    // Enter 키로 게임 시작
    document.getElementById('playerName').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        startGame();
      }
    });

    async function startGame() {
      const name = document.getElementById('playerName').value.trim();
      const errorDiv = document.getElementById('error-message');

      errorDiv.textContent = '';

      // 입력 검증
      if (!name) {
        errorDiv.textContent = '이름을 입력하세요';
        return;
      }

      if (name.length < 2 || name.length > 20) {
        errorDiv.textContent = '이름은 2~20자여야 합니다';
        return;
      }

      if (!/^[가-힣a-zA-Z0-9_]+$/.test(name)) {
        errorDiv.textContent = '한글, 영문, 숫자, 언더스코어만 사용 가능합니다';
        return;
      }

      try {
        const response = await fetch('/api/player/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ name: name })
        });

        const data = await response.json();

        if (!response.ok) {
          errorDiv.textContent = data.error || '오류가 발생했습니다';
          return;
        }

        // 이름 저장
        localStorage.setItem('playerName', name);
        localStorage.setItem('playerData', JSON.stringify(data.player));

        // 게임 선택 화면으로 이동
        showGameSelection(data.player);
      } catch (error) {
        console.error('게임 시작 오류:', error);
        errorDiv.textContent = '서버 오류가 발생했습니다';
      }
    }

    function showGameSelection(playerData) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('gameSelectionScreen').style.display = 'block';
      currentPlayer = playerData;
      updateGameSelectionDisplay();
    }

    function updateGameSelectionDisplay() {
      document.getElementById('selectedPlayerName').textContent = currentPlayer.name;
      document.getElementById('gameSelectionChips').textContent = currentPlayer.chips;
      document.getElementById('gameSelectionBalance').textContent = `$${(currentPlayer.balance / 100).toFixed(2)}`;
    }

    async function refreshPlayerData() {
      try {
        const response = await fetch(`/api/player/${currentPlayer.name}`);
        const data = await response.json();
        if (data.success) {
          currentPlayer = data.player;
          updateGameSelectionDisplay();
        }
      } catch (error) {
        console.error('플레이어 정보 새로고침 오류:', error);
      }
    }

    async function selectGame(game) {
      // 최신 플레이어 정보 저장 후 게임 페이지로 이동
      try {
        const response = await fetch(`/api/player/${currentPlayer.name}`);
        const data = await response.json();
        if (data.success) {
          localStorage.setItem('playerData', JSON.stringify(data.player));
        }
      } catch (error) {
        console.error('플레이어 정보 조회 오류:', error);
      }
      window.location.href = '/games.html';
    }

    function changePlayer() {
      localStorage.removeItem('playerName');
      localStorage.removeItem('playerData');
      document.getElementById('loginScreen').style.display = 'block';
      document.getElementById('gameSelectionScreen').style.display = 'none';
      document.getElementById('playerName').value = '';
      document.getElementById('error-message').textContent = '';
      currentPlayer = null;
    }

    // 게임 선택 화면이 보일 때 5초마다 칩 새로고침 (실시간 반영)
    setInterval(() => {
      if (currentPlayer && document.getElementById('gameSelectionScreen').style.display === 'block') {
        refreshPlayerData();
      }
    }, 5000);

    // 페이지 포커스 시 칩 즉시 새로고침
    window.addEventListener('focus', () => {
      if (currentPlayer && document.getElementById('gameSelectionScreen').style.display === 'block') {
        refreshPlayerData();
      }
    });
  </script>
</body>
</html>
